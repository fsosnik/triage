<svg width="100%" viewBox="0 0 680 820" role="img">
<title>TRIAGE OS: Seven-Layer Architecture</title>
<desc>Evidence-driven system with validation gates at core</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.layer { stroke-width: 0.5; }
.layer-title { font-size: 14px; font-weight: 500; }
.layer-desc { font-size: 12px; }
</style>
</defs>

<!-- Layer 7 -->
<g>
<rect class="layer" x="80" y="40" width="520" height="50" rx="8" fill="#E8D1F5" stroke="#534AB7"/>
<text class="layer-title" x="340" y="60" text-anchor="middle" fill="#26215C">Layer 7: Knowledge Base & Evolution</text>
<text class="layer-desc" x="340" y="78" text-anchor="middle" fill="#3C3489">Pattern library, blocklist, auto-correction from production data</text>
</g>

<!-- Layer 6 -->
<g>
<rect class="layer" x="80" y="110" width="520" height="50" rx="8" fill="#B5D4F4" stroke="#185FA5"/>
<text class="layer-title" x="340" y="130" text-anchor="middle" fill="#042C53">Layer 6: Checkpoint & Verification</text>
<text class="layer-desc" x="340" y="148" text-anchor="middle" fill="#0C447C">Git state tracking, complete audit trail, compliance logging</text>
</g>

<!-- Layer 5 CORE -->
<g>
<rect class="layer" x="60" y="180" width="560" height="60" rx="8" fill="#EF9F27" stroke="#854F0B" stroke-width="2"/>
<text class="layer-title" x="340" y="207" text-anchor="middle" fill="#412402">Layer 5: Validation Gate (CORE)</text>
<text class="layer-desc" x="340" y="227" text-anchor="middle" fill="#632806">Real evidence only. No hallucinations. Success or failure paths.</text>
</g>

<!-- Layer 4 -->
<g>
<rect class="layer" x="80" y="260" width="520" height="50" rx="8" fill="#C0DD97" stroke="#3B6D11"/>
<text class="layer-title" x="340" y="280" text-anchor="middle" fill="#173404">Layer 4: Execution Tools</text>
<text class="layer-desc" x="340" y="298" text-anchor="middle" fill="#27500A">Git, Bash, Tests, APIs, PostgreSQL, Redis, Custom validators</text>
</g>

<!-- Layer 3 -->
<g>
<rect class="layer" x="80" y="330" width="520" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56"/>
<text class="layer-title" x="340" y="350" text-anchor="middle" fill="#04342C">Layer 3: Agent Mesh</text>
<text class="layer-desc" x="340" y="368" text-anchor="middle" fill="#085041">Code agent, QA agent, Research agent, Risk agent (parallelizable)</text>
</g>

<!-- Layer 2 -->
<g>
<rect class="layer" x="80" y="400" width="520" height="50" rx="8" fill="#F5C4B3" stroke="#993C1D"/>
<text class="layer-title" x="340" y="420" text-anchor="middle" fill="#4A1B0C">Layer 2: Core Orchestrator</text>
<text class="layer-desc" x="340" y="438" text-anchor="middle" fill="#712B13">Task routing, evidence synthesis, decision engine</text>
</g>

<!-- Layer 1 -->
<g>
<rect class="layer" x="80" y="470" width="520" height="50" rx="8" fill="#D3D1C7" stroke="#5F5E5A"/>
<text class="layer-title" x="340" y="490" text-anchor="middle" fill="#2C2C2A">Layer 1: Input Interface</text>
<text class="layer-desc" x="340" y="508" text-anchor="middle" fill="#444441">Task definition, constraints, evidence requirements</text>
</g>

<!-- Evidence arrow -->
<circle cx="650" cy="210" r="8" fill="none" stroke="#BA7517" stroke-width="1.5"/>
<line x1="640" y1="210" x2="620" y2="210" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="layer-desc" x="655" y="215" fill="#854F0B">EVIDENCE</text>

<!-- Success/Failure Paths -->
<g transform="translate(0, 580)">
<text class="layer-title" x="340" y="20" text-anchor="middle" fill="#26215C">Validation Outcomes</text>

<!-- Success Path -->
<g>
<rect class="layer" x="80" y="40" width="240" height="60" rx="8" fill="#E5F3E0" stroke="#3B6D11"/>
<text class="layer-title" x="200" y="63" text-anchor="middle" fill="#173404">Success Path</text>
<text class="layer-desc" x="200" y="83" text-anchor="middle" fill="#27500A">Learning Loop: Capture pattern, improve decision</text>
</g>

<!-- Failure Path -->
<g>
<rect class="layer" x="360" y="40" width="240" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D"/>
<text class="layer-title" x="480" y="63" text-anchor="middle" fill="#501313">Failure Path</text>
<text class="layer-desc" x="480" y="83" text-anchor="middle" fill="#791F1F">Rollback: Revert, blocklist, reduce agent weight</text>
</g>
</g>

</svg>
