<svg width="100%" viewBox="0 0 680 480" role="img">
<title>Orkest: Business Operations Platform Architecture</title>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<text style="font-size: 14px; font-weight: 500;" x="340" y="30" text-anchor="middle" fill="#26215C">Orkest: Agentic Transactional Core</text>

<!-- Orkest Core -->
<g>
<rect x="80" y="60" width="520" height="100" rx="8" fill="#E8D1F5" stroke="#534AB7" stroke-width="1.5"/>
<text style="font-size: 14px; font-weight: 500;" x="340" y="90" text-anchor="middle" fill="#26215C">Orkest Core Runtime</text>
<text style="font-size: 12px;" x="340" y="110" text-anchor="middle" fill="#3C3489">Identity, modules, lifecycle, audit, integrations</text>
<text style="font-size: 12px;" x="340" y="130" text-anchor="middle" fill="#3C3489">Shared by all business modules</text>
</g>

<!-- Business Modules -->
<g>
<text style="font-size: 14px; font-weight: 500;" x="340" y="210" text-anchor="middle" fill="#26215C">Business Modules (Sit on Top)</text>
</g>

<g>
<rect x="50" y="240" width="120" height="80" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text style="font-size: 13px; font-weight: 500;" x="110" y="265" text-anchor="middle" fill="#042C53">Didi</text>
<text style="font-size: 11px;" x="110" y="283" text-anchor="middle" fill="#0C447C">Property Mgmt</text>
<text style="font-size: 11px;" x="110" y="298" text-anchor="middle" fill="#0C447C">500+ units live</text>
</g>

<g>
<rect x="200" y="240" width="120" height="80" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text style="font-size: 13px; font-weight: 500;" x="260" y="265" text-anchor="middle" fill="#173404">Insurance</text>
<text style="font-size: 11px;" x="260" y="283" text-anchor="middle" fill="#27500A">Claims</text>
<text style="font-size: 11px;" x="260" y="298" text-anchor="middle" fill="#27500A">Processing</text>
</g>

<g>
<rect x="350" y="240" width="120" height="80" rx="8" fill="#EF9F27" stroke="#854F0B" stroke-width="0.5"/>
<text style="font-size: 13px; font-weight: 500;" x="410" y="265" text-anchor="middle" fill="#412402">Finance</text>
<text style="font-size: 11px;" x="410" y="283" text-anchor="middle" fill="#632806">Invoices</text>
<text style="font-size: 11px;" x="410" y="298" text-anchor="middle" fill="#632806">Approvals</text>
</g>

<g>
<rect x="500" y="240" width="120" height="80" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text style="font-size: 13px; font-weight: 500;" x="560" y="265" text-anchor="middle" fill="#04342C">Custom</text>
<text style="font-size: 11px;" x="560" y="283" text-anchor="middle" fill="#085041">Your module</text>
<text style="font-size: 11px;" x="560" y="298" text-anchor="middle" fill="#085041">here</text>
</g>

<!-- Agent Mesh -->
<g>
<text style="font-size: 14px; font-weight: 500;" x="340" y="380" text-anchor="middle" fill="#26215C">Agent Mesh Layer</text>
<rect x="80" y="400" width="520" height="60" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text style="font-size: 12px;" x="340" y="435" text-anchor="middle" fill="#4A1B0C">Agents orchestrate workflows: maintenance routing, approvals, tenant communication</text>
</g>

</svg>
