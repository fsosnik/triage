  <text x="600" y="790" font-size="12" text-anchor="middle" fill="#fde68a">Security audit</text>
  <text x="600" y="805" font-size="12" text-anchor="middle" fill="#fde68a">Blocklist patterns</text>
  <text x="600" y="820" font-size="12" text-anchor="middle" fill="#fde68a">Tests + coverage</text>
  
