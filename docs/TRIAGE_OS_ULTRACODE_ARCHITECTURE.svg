  <text x="900" y="765" font-size="18" font-weight="bold" text-anchor="middle" fill="#facc15">W-Deploy</text>
  <text x="900" y="790" font-size="12" text-anchor="middle" fill="#fef08a">Verify production</text>
  <text x="900" y="805" font-size="12" text-anchor="middle" fill="#fef08a">Rate limiting</text>
  <text x="900" y="820" font-size="12" text-anchor="middle" fill="#fef08a">Monitoring setup</text>
  
