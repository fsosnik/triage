<svg width="100%" viewBox="0 0 680 500" role="img">
<title>Enterprise AI LLM Portfolio: Architecture</title>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</marker>
<style>
.box { stroke-width: 0.5; }
.title { font-size: 14px; font-weight: 500; }
.text { font-size: 12px; }
</style>
</defs>

<text class="title" x="340" y="30" text-anchor="middle" fill="#26215C">Enterprise AI LLM Portfolio: Seven Patterns</text>

<!-- RAG -->
<g>
<rect class="box" x="40" y="60" width="140" height="80" rx="8" fill="#B5D4F4" stroke="#185FA5"/>
<text class="title" x="110" y="85" text-anchor="middle" fill="#042C53">RAG Foundation</text>
<text class="text" x="110" y="105" text-anchor="middle" fill="#0C447C">94% accuracy</text>
<text class="text" x="110" y="120" text-anchor="middle" fill="#0C447C">Chunking, ranking</text>
</g>

<!-- Fine-tuning -->
<g>
<rect class="box" x="200" y="60" width="140" height="80" rx="8" fill="#C0DD97" stroke="#3B6D11"/>
<text class="title" x="270" y="85" text-anchor="middle" fill="#173404">Fine-tuning</text>
<text class="text" x="270" y="105" text-anchor="middle" fill="#27500A">Drift detection</text>
<text class="text" x="270" y="120" text-anchor="middle" fill="#27500A">Cost optimized</text>
</g>

<!-- Router -->
<g>
<rect class="box" x="360" y="60" width="140" height="80" rx="8" fill="#EF9F27" stroke="#854F0B"/>
<text class="title" x="430" y="85" text-anchor="middle" fill="#412402">Multi-Model Router</text>
<text class="text" x="430" y="105" text-anchor="middle" fill="#632806">60% cost savings</text>
<text class="text" x="430" y="120" text-anchor="middle" fill="#632806">Fallback chains</text>
</g>

<!-- Prompting -->
<g>
<rect class="box" x="520" y="60" width="140" height="80" rx="8" fill="#9FE1CB" stroke="#0F6E56"/>
<text class="title" x="590" y="85" text-anchor="middle" fill="#04342C">Prompting</text>
<text class="text" x="590" y="105" text-anchor="middle" fill="#085041">Templates</text>
<text class="text" x="590" y="120" text-anchor="middle" fill="#085041">Validation</text>
</g>

<!-- Long-context -->
<g>
<rect class="box" x="100" y="180" width="140" height="80" rx="8" fill="#F5C4B3" stroke="#993C1D"/>
<text class="title" x="170" y="205" text-anchor="middle" fill="#4A1B0C">Long-Context</text>
<text class="text" x="170" y="225" text-anchor="middle" fill="#712B13">Hierarchical</text>
<text class="text" x="170" y="240" text-anchor="middle" fill="#712B13">processing</text>
</g>

<!-- Cost Optimization -->
<g>
<rect class="box" x="270" y="180" width="140" height="80" rx="8" fill="#CECBF6" stroke="#534AB7"/>
<text class="title" x="340" y="205" text-anchor="middle" fill="#26215C">Cost Optimization</text>
<text class="text" x="340" y="225" text-anchor="middle" fill="#3C3489">Token counting</text>
<text class="text" x="340" y="240" text-anchor="middle" fill="#3C3489">Batching</text>
</g>

<!-- Evaluation -->
<g>
<rect class="box" x="440" y="180" width="140" height="80" rx="8" fill="#D3D1C7" stroke="#5F5E5A"/>
<text class="title" x="510" y="205" text-anchor="middle" fill="#2C2C2A">Evaluation</text>
<text class="text" x="510" y="225" text-anchor="middle" fill="#444441">Metrics & testing</text>
<text class="text" x="510" y="240" text-anchor="middle" fill="#444441">Benchmarks</text>
</g>

<!-- Result -->
<g>
<rect class="box" x="120" y="320" width="440" height="70" rx="8" fill="#E5F3E0" stroke="#3B6D11" stroke-width="2"/>
<text class="title" x="340" y="350" text-anchor="middle" fill="#173404">Production-Ready LLM Architecture</text>
<text class="text" x="340" y="370" text-anchor="middle" fill="#27500A">50k+ requests evaluated | 94% accuracy | 60% cost reduction</text>
</g>

</svg>
