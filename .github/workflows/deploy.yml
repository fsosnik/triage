name: Test & Validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: node -c src/core/os.js || true
      - run: node -c src/integration/github-connector.js || true
      - run: node -c src/analytics/analytics-engine.js || true
      - run: node scripts/validate-structure.js || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: triage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
