name: ✅ Tests & Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Validate Structure
        run: npm run validate:structure

      - name: ✔️ Validate Patterns
        run: npm run test:patterns
        continue-on-error: true

      - name: 🚫 Validate Blocklist
        run: npm run test:blocklist
        continue-on-error: true

      - name: 🧪 Run Tests
        run: npm test
        continue-on-error: true

      - name: 📊 Check Consumption
        run: npm run test:consumption
        continue-on-error: true

      - name: 📋 Lint Code
        run: npm run lint
        continue-on-error: true

      - name: 📝 Format Check
        run: npm run format
        continue-on-error: true

      - name: 💬 Slack on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: 'TRIAGE: Validation failed on ${{ github.ref }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
